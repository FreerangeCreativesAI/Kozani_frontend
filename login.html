<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google Tag Manager -->

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Kozani</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
<body>
    <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KGWDRGVZ"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div class="page">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div class="brand">Kozani</div>
        <div class="tagline">Your caring companion through pregnancy and new motherhood</div>
      </div>

      <!-- Tabs (hidden when forgot password panel is active) -->
      <div class="tabs" id="tabs" role="tablist">
        <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true"  aria-controls="panel-login"  onclick="switchTab('login')">Sign in</button>
        <button class="tab-btn"        id="tab-signup" role="tab" aria-selected="false" aria-controls="panel-signup" onclick="switchTab('signup')">Create account</button>
      </div>

      <!-- Body -->
      <div class="card-body">

        <!-- Login panel -->
        <div class="panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
          <div class="msg-box" id="msg-login" role="alert"></div>
          <label>
            Email
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
          </label>
          <label>
            Password
            <div class="input-wrap">
              <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" />
              <button type="button" class="eye-btn" onclick="togglePassword('login-password', this)" aria-label="Show password">
                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </label>
          <button class="forgot-link" onclick="switchTab('forgot')">Forgot password?</button>
          <button class="btn-primary" id="login-btn" onclick="handleLogin()">
            <span class="spinner"></span>
            <span class="btn-label">Sign in</span>
          </button>
        </div>

        <!-- Sign-up panel -->
        <div class="panel" id="panel-signup" role="tabpanel" aria-labelledby="tab-signup">
          <div class="msg-box" id="msg-signup" role="alert"></div>
          <label>
            Email
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
          </label>
          <label>
            Password
            <div class="input-wrap">
              <input type="password" id="signup-password" placeholder="Choose a password" autocomplete="new-password" />
              <button type="button" class="eye-btn" onclick="togglePassword('signup-password', this)" aria-label="Show password">
                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </label>
          <label>
            Confirm password
            <div class="input-wrap">
              <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" />
              <button type="button" class="eye-btn" onclick="togglePassword('signup-confirm', this)" aria-label="Show password">
                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </label>

          <!-- Consent checkboxes -->
          <div class="consent-group">
            <label class="consent-label">
              <input type="checkbox" id="consent-terms" />
              <span>I have read and agree to the <a href="terms.html" target="_blank">Terms and Conditions</a>.<span class="required-star"> *</span></span>
            </label>
            <label class="consent-label">
              <input type="checkbox" id="consent-data" />
              <span>I consent to Kozani processing my health-related data to provide this service.<span class="required-star"> *</span></span>
            </label>
          </div>

          <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
            <span class="spinner"></span>
            <span class="btn-label">Create account</span>
          </button>
        </div>

        <!-- Forgot password panel -->
        <div class="panel" id="panel-forgot">
          <div class="msg-box" id="msg-forgot" role="alert"></div>
          <label>
            Email
            <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email" />
          </label>
          <button class="btn-primary" id="forgot-btn" onclick="handleForgotPassword()">
            <span class="spinner"></span>
            <span class="btn-label">Send reset link</span>
          </button>
          <button class="back-link" onclick="switchTab('login')">← Back to sign in</button>
        </div>

      </div><!-- /card-body -->

      <!-- Footer -->
      <div class="card-footer">
        Your conversations are treated with care and won't be shared without your permission.
      </div>

    </div><!-- /card -->
  </div><!-- /page -->

  <script>
    /* ── Supabase init ── */
    const SUPABASE_URL  = 'https://pxwtychuelnrainihaab.supabase.co';
    const SUPABASE_KEY  = 'sb_publishable__diWzjMaKAvj2JjA_-HlIA_2Yxo7fqu';
    const APP_PAGE      = 'index.html';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ── Intercept password recovery events before anything else ── */
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        window.location.href = '/reset-password.html';
      }
    });

    /* ── If already logged in, skip this page ── */
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = APP_PAGE;
    });

    /* ── Toggle password visibility ── */
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.querySelector('.eye-icon').style.display     = isHidden ? 'none' : '';
      btn.querySelector('.eye-off-icon').style.display = isHidden ? ''     : 'none';
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }

    /* ── Tab switching ── */
    function switchTab(tab) {
      const tabs = ['login', 'signup'];
      const isForgot = tab === 'forgot';

      document.getElementById('tabs').style.display = isForgot ? 'none' : '';

      tabs.forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
        document.getElementById(`tab-${t}`).setAttribute('aria-selected', t === tab);
      });

      [...tabs, 'forgot'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
      });

      // Clear all message boxes when switching tabs
      ['msg-login', 'msg-signup', 'msg-forgot'].forEach(id => showMsg(id, '', ''));
    }

    /* ── Status message ── */
    function showMsg(boxId, text, type) {
      const box = document.getElementById(boxId);
      box.textContent = text;
      box.className = 'msg-box' + (text ? ` show ${type}` : '');
    }

    /* ── Loading state ── */
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    /* ── Login ── */
    async function handleLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showMsg('msg-login', 'Please enter your email and password.', 'error'); return; }

      setLoading('login-btn', true);
      showMsg('msg-login', '', '');

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showMsg('msg-login', error.message, 'error');
        setLoading('login-btn', false);
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ event: 'login_failed', method: 'email' });
      } else {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ event: 'login_success', method: 'email' });
        window.location.href = APP_PAGE;
      }
    }

    /* ── Sign-up ── */
    async function handleSignup() {
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm  = document.getElementById('signup-confirm').value;
      const termsOk  = document.getElementById('consent-terms').checked;
      const dataOk   = document.getElementById('consent-data').checked;

      if (!email || !password || !confirm) { showMsg('msg-signup', 'Please fill in all fields.', 'error'); return; }
      if (password.length < 6) { showMsg('msg-signup', 'Password must be at least 6 characters.', 'error'); return; }
      if (password !== confirm) { showMsg('msg-signup', 'Passwords don\'t match. Please try again.', 'error'); return; }
      if (!termsOk) { showMsg('msg-signup', 'Please agree to the Terms and Conditions to continue.', 'error'); return; }
      if (!dataOk)  { showMsg('msg-signup', 'Please consent to data processing to continue.', 'error'); return; }

      setLoading('signup-btn', true);
      showMsg('msg-signup', '', '');

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            consent_terms_version: '1.0',
            consent_terms_at: new Date().toISOString(),
            consent_data_processing: true,
            consent_data_processing_at: new Date().toISOString()
          }
        }
      });

      setLoading('signup-btn', false);

      if (error) {
        showMsg('msg-signup', error.message, 'error');
      } else {
        showMsg('msg-signup', 'Almost there! Check your email to confirm your account.', 'success');
      }
    }

    /* ── Forgot password ── */
    async function handleForgotPassword() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) { showMsg('msg-forgot', 'Please enter your email address.', 'error'); return; }

      setLoading('forgot-btn', true);
      showMsg('msg-forgot', '', '');

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://www.kozani.co.za/reset-password.html'
      });

      setLoading('forgot-btn', false);

      if (error) {
        showMsg('msg-forgot', error.message, 'error');
      } else {
        showMsg('msg-forgot', "If an account exists for that email, you'll receive a reset link shortly.", 'success');
      }
    }

    /* ── Allow Enter key ── */
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('panel-login').classList.contains('active'))  handleLogin();
      if (document.getElementById('panel-signup').classList.contains('active')) handleSignup();
      if (document.getElementById('panel-forgot').classList.contains('active')) handleForgotPassword();
    });
  </script>
</body>
</html>

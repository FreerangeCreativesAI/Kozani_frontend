<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Kozani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
  <style>
    .reset-card {
      padding: 36px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .reset-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: #0a0b0d;
      margin-bottom: 4px;
    }

    .reset-subtitle {
      font-size: .9rem;
      color: var(--muted);
      margin-top: -8px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div class="brand">Kozani</div>
        <div class="tagline">Your caring companion through pregnancy and new motherhood</div>
      </div>

      <!-- Body -->
      <div class="reset-card">
        <div class="reset-title">Set a new password</div>
        <p class="reset-subtitle">Must be at least 6 characters.</p>

        <div class="msg-box" id="msg-box" role="alert"></div>

        <label>
          New password
          <input type="password" id="new-password" placeholder="Choose a new password" autocomplete="new-password" />
        </label>
        <label>
          Confirm new password
          <input type="password" id="confirm-password" placeholder="Repeat your new password" autocomplete="new-password" />
        </label>

        <button class="btn-primary" id="reset-btn" onclick="handleReset()">
          <span class="spinner"></span>
          <span class="btn-label">Update password</span>
        </button>
      </div>

      <!-- Footer -->
      <div class="card-footer">
        Your conversations are treated with care and won't be shared without your permission.
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://pxwtychuelnrainihaab.supabase.co';
    const SUPABASE_KEY  = 'sb_publishable__diWzjMaKAvj2JjA_-HlIA_2Yxo7fqu';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Supabase puts the session token in the URL hash when redirecting here.
    // getSession() reads and stores it so we can call updateUser().
    sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) {
        showMsg('This reset link is invalid or has expired. Please request a new one.', 'error');
        document.getElementById('reset-btn').disabled = true;
      }
    });

    function showMsg(text, type) {
      const box = document.getElementById('msg-box');
      box.textContent = text;
      box.className = 'msg-box' + (text ? ` show ${type}` : '');
    }

    function setLoading(loading) {
      const btn = document.getElementById('reset-btn');
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    async function handleReset() {
      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;

      if (!password || !confirm) { showMsg('Please fill in both fields.', 'error'); return; }
      if (password.length < 6)   { showMsg('Password must be at least 6 characters.', 'error'); return; }
      if (password !== confirm)  { showMsg("Passwords don't match. Please try again.", 'error'); return; }

      setLoading(true);
      showMsg('', '');

      const { error } = await sb.auth.updateUser({ password });

      setLoading(false);

      if (error) {
        showMsg(error.message, 'error');
      } else {
        showMsg('Password updated! Redirecting you to the app…', 'success');
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleReset();
    });
  </script>
</body>
</html>
